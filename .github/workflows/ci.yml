name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install ruff==0.8.0 pytest==8.3.4 pytest-asyncio==0.24.0 httpx==0.28.1
          pip install -r services/stream-processor/requirements.txt

      - name: Ruff lint
        run: ruff check services/ tests/ --ignore ANN,S,T20

      - name: Ruff format check
        run: ruff format --check services/ tests/

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  trivy-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        service: [user-service, routing-engine, analytics-service, iot-simulator, stream-processor]
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scan
        run: |
          docker build -t urbanmove/${{ matrix.service }}:scan \
            services/${{ matrix.service }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: urbanmove/${{ matrix.service }}:scan
          format: table
          exit-code: "0"          # Don't fail CI — report only
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.3"

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="google_maps_api_key=${{ secrets.GOOGLE_MAPS_API_KEY }}" \
            -var="firebase_api_key=${{ secrets.FIREBASE_API_KEY }}" \
            -no-color -out=tfplan
        continue-on-error: true
